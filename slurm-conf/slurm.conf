# ===== BASIC =====
ClusterName=containertest
SlurmctldHost=slurm-test

SlurmUser=slurm

SlurmctldPort=6817
SlurmdPort=6818

AuthType=auth/munge

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd

SwitchType=switch/none
MpiDefault=none

SlurmctldTimeout=120
SlurmdTimeout=300

# ===== LOGGING =====
SlurmctldDebug=3
SlurmdDebug=3

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# ===== SCHEDULING =====
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory

# ===== CRITICAL: DISABLE CGROUPS =====
ProctrackType=proctrack/pgid

TaskPlugin=task/none
TaskPluginParam=none

JobAcctGatherType=jobacct_gather/none
JobAcctGatherFrequency=0

# ===== GRES (GPU SUPPORT) =====
GresTypes=gpu

# ===== NODE DEFINITION =====
NodeName=slurm-test \
  CPUs=8 \
  Sockets=1 \
  CoresPerSocket=4 \
  ThreadsPerCore=2 \
  RealMemory=30000 \
  Gres=gpu:dummy:1 \
  State=UNKNOWN

# ===== PARTITION =====
PartitionName=debug \
  Nodes=ALL \
  Default=YES \
  MaxTime=INFINITE \
  State=UP
